<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TempMailBox</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

<header class="border-b border-gray-800">
  <div class="max-w-5xl mx-auto px-4 py-4 flex justify-between items-center">

    <div>
      <h1 class="font-bold text-lg">TempMailBox</h1>
      <p class="text-xs text-gray-400">10 minute disposable email</p>
    </div>

    <button id="btnNew" class="bg-green-500 text-black px-4 py-2 rounded">
      New Address
    </button>

  </div>
</header>

<main class="flex-1 p-4 max-w-5xl mx-auto w-full space-y-4">

<div id="alert" class="hidden"></div>

<div class="bg-gray-900 p-4 rounded space-y-3">
  <div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

    <div class="flex-1 min-w-0">
      <p class="text-xs text-gray-400">Your email</p>
      <div class="bg-black/40 border border-gray-700 rounded px-3 py-2 mt-1">
        <p id="emailText" class="font-mono text-sm truncate">Creating...</p>
      </div>
      <p class="text-xs text-gray-500 mt-2">
        Expires in <span id="countdown">--:--</span>
      </p>
      <p id="autoStatus" class="text-xs text-gray-500 mt-1">
        Auto-refresh active
      </p>
    </div>

    <div class="flex flex-wrap gap-2">
      <button id="btnExtend" class="bg-purple-600 hover:bg-purple-500 px-4 py-2 text-xs rounded font-semibold">
        Extend +10m
      </button>
      <button id="btnCopy" class="border px-4 py-2 text-xs rounded">Copy</button>
      <button id="btnRefresh" class="border px-4 py-2 text-xs rounded">Refresh</button>
    </div>

  </div>
</div>

<div class="grid md:grid-cols-2 gap-4">

<div class="bg-gray-900 p-4 rounded">
  <h2 class="mb-2 font-semibold">Inbox</h2>
  <ul id="inboxList" class="space-y-2"></ul>
</div>

<div class="bg-gray-900 p-4 rounded">
  <h2 class="mb-2 font-semibold">Message</h2>
  <div id="msgBody" class="text-sm text-gray-300">
    Select a message to read it.
  </div>
</div>

</div>

<p class="text-[11px] text-gray-600 text-center">
  Email inbox powered by mail.tm
</p>

</main>

<script>
const API = "/.netlify/functions/relay";

let state = null;
let timer = null;
let refreshing = false;
let autoRefreshTimer = null;

function $(id) {
  return document.getElementById(id);
}

function showPopup(message, type = "success") {
  const alertBox = $("alert");

  alertBox.textContent = message;
  alertBox.className =
    "fixed top-5 left-1/2 -translate-x-1/2 z-50 font-semibold px-5 py-3 rounded-xl shadow-lg " +
    (type === "success"
      ? "bg-green-500 text-black"
      : "bg-red-600 text-white");

  setTimeout(() => {
    alertBox.className = "hidden";
    alertBox.textContent = "";
  }, 1800);
}

async function api(action, params = {}) {
  const url = new URL(API, location.origin);
  url.searchParams.set("action", action);

  Object.entries(params).forEach(([key, value]) => {
    if (value !== undefined && value !== null) {
      url.searchParams.set(key, value);
    }
  });

  const res = await fetch(url.toString(), {
    method: "GET",
    headers: { "cache-control": "no-store" },
  });

  const data = await res.json();

  if (!res.ok || data.error) {
    throw new Error(data.error || "Request failed");
  }

  return data;
}

function updateTimer() {
  if (!state || !state.expiresAt) return;

  const diff = state.expiresAt - Date.now();

  if (diff <= 0) {
    $("countdown").textContent = "Expired";
    $("autoStatus").textContent = "Inbox expired";
    return;
  }

  const minutes = Math.floor(diff / 60000);
  const seconds = Math.floor((diff % 60000) / 1000);

  $("countdown").textContent =
    `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}`;
}

function renderInbox(items) {
  const list = $("inboxList");
  list.innerHTML = "";

  if (!items || items.length === 0) {
    const empty = document.createElement("li");
    empty.className = "text-sm text-gray-400 p-3 border border-gray-700 rounded";
    empty.textContent = "No emails yet. Auto-refresh is checking every 5 seconds.";
    list.appendChild(empty);
    return;
  }

  items.forEach((item) => {
    const li = document.createElement("li");
    li.className =
      "p-3 border border-gray-700 rounded cursor-pointer hover:bg-gray-800 transition";

    li.innerHTML = `
      <div class="text-xs text-gray-400 truncate">${item.from || "Unknown sender"}</div>
      <div class="font-semibold">${item.subject || "(no subject)"}</div>
      <div class="text-xs text-gray-500">${item.createdAt ? new Date(item.createdAt).toLocaleString() : ""}</div>
    `;

    li.onclick = () => loadMessage(item.id);
    list.appendChild(li);
  });
}

function startAutoRefresh() {
  if (autoRefreshTimer) {
    clearInterval(autoRefreshTimer);
  }

  autoRefreshTimer = setInterval(() => {
    if (!state || !state.token) return;
    if (state.expiresAt <= Date.now()) return;
    if (document.hidden) return;

    refreshInbox(false);
    $("autoStatus").textContent = "Auto-refresh checked just now";
  }, 5000);
}

async function newInbox() {
  try {
    showPopup("Creating new inbox...", "success");

    const data = await api("newInbox");
    state = data;

    $("emailText").textContent = data.address;

    clearInterval(timer);
    timer = setInterval(updateTimer, 1000);
    updateTimer();

    renderInbox([]);
    $("msgBody").innerHTML = "Select a message to read it.";
    $("autoStatus").textContent = "Auto-refresh active";

    await refreshInbox(false);
    startAutoRefresh();

  } catch (err) {
    $("emailText").textContent = "Could not create inbox";
    showPopup("Failed to create inbox", "error");
  }
}

async function refreshInbox(showMessage = true) {
  if (!state || !state.token || refreshing) return;

  const btn = $("btnRefresh");
  const oldText = btn.textContent;

  try {
    refreshing = true;
    btn.disabled = true;
    btn.textContent = "Checking...";
    btn.classList.add("opacity-70");

    const items = await api("getMessages", {
      token: state.token,
    });

    renderInbox(items);

    if (showMessage) {
      if (items.length > 0) {
        showPopup(`Inbox updated — ${items.length} email(s) found`, "success");
      } else {
        showPopup("Inbox checked — no emails yet", "success");
      }
    }

  } catch (err) {
    if (showMessage) showPopup("Refresh failed — try again", "error");
  } finally {
    refreshing = false;
    btn.disabled = false;
    btn.textContent = oldText || "Refresh";
    btn.classList.remove("opacity-70");
  }
}

async function loadMessage(id) {
  try {
    showPopup("Opening message...", "success");

    const msg = await api("readMessage", {
      id,
      token: state.token,
    });

    const body = $("msgBody");

    body.innerHTML = `
      <div class="space-y-3">
        <div>
          <div class="text-xs text-gray-400">Subject</div>
          <div class="font-semibold">${msg.subject || "(no subject)"}</div>
        </div>
        <div class="text-xs text-gray-400">
          <div><strong>From:</strong> ${msg.from || ""}</div>
          <div><strong>To:</strong> ${msg.to || ""}</div>
          <div><strong>Date:</strong> ${msg.createdAt ? new Date(msg.createdAt).toLocaleString() : ""}</div>
        </div>
        <div class="bg-black border border-gray-700 rounded p-3 text-sm overflow-auto">
          ${msg.htmlBody || msg.body || "No message body."}
        </div>
      </div>
    `;
  } catch (err) {
    showPopup("Could not open message", "error");
  }
}

$("btnNew").onclick = newInbox;

$("btnCopy").onclick = async () => {
  if (!state || !state.address) {
    showPopup("No email to copy", "error");
    return;
  }

  try {
    await navigator.clipboard.writeText(state.address);
    showPopup("✅ Email copied to clipboard", "success");
  } catch (err) {
    showPopup("Copy failed — copy manually", "error");
  }
};

$("btnRefresh").onclick = () => refreshInbox(true);

$("btnExtend").onclick = () => {
  if (!state || !state.expiresAt) {
    showPopup("No inbox to extend", "error");
    return;
  }

  const btn = $("btnExtend");
  const oldText = btn.textContent;

  btn.disabled = true;
  btn.textContent = "Extending...";
  btn.classList.add("opacity-70");

  state.expiresAt += 10 * 60 * 1000;
  updateTimer();

  setTimeout(() => {
    btn.disabled = false;
    btn.textContent = oldText || "Extend +10m";
    btn.classList.remove("opacity-70");
    showPopup("✅ Extended by 10 minutes", "success");
  }, 400);
};

newInbox();
</script>

</body>
</html>
