<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TempMailBox</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdn.tailwindcss.com"></script>

</head>

<body class="bg-black text-white min-h-screen flex flex-col">

<header class="p-4 border-b border-gray-800 flex justify-between items-center">
  <div>
    <h1 class="font-bold text-lg">TempMailBox</h1>
    <p class="text-xs text-gray-400">10 minute disposable email</p>
  </div>

  <button id="btnNew" class="bg-green-500 text-black px-4 py-2 rounded">
    New Address
  </button>
</header>

<main class="flex-1 p-4 max-w-5xl mx-auto w-full space-y-4">

<div id="alert" class="hidden text-sm p-2 rounded"></div>

<div class="bg-gray-900 p-4 rounded space-y-2">
  <div class="flex justify-between items-center">
    <div>
      <p class="text-xs text-gray-400">Your email</p>
      <p id="shortEmail" class="text-lg font-mono"></p>
      <p class="text-xs text-gray-500">
        Expires in <span id="countdown"></span>
      </p>
    </div>

    <div class="flex gap-2">
      <button id="btnCopy" class="border px-3 py-1 text-xs">Copy</button>
      <button id="btnRefresh" class="border px-3 py-1 text-xs">Refresh</button>
    </div>
  </div>
</div>

<div class="grid md:grid-cols-2 gap-4">

<div class="bg-gray-900 p-4 rounded">
  <h2 class="mb-2">Inbox</h2>
  <ul id="inboxList" class="space-y-2"></ul>
</div>

<div class="bg-gray-900 p-4 rounded">
  <h2 class="mb-2">Message</h2>
  <div id="msgBody"></div>
</div>

</div>

</main>

<script>

const API = "/.netlify/functions/relay";
let state = null;

function showAlert(msg){
  const el = document.getElementById("alert");
  if(!msg){
    el.classList.add("hidden");
    return;
  }
  el.textContent = msg;
  el.classList.remove("hidden");
}

function shortEmail(email){
  if(!email) return "";
  const [name,domain] = email.split("@");
  return name.slice(0,6) + "...@" + domain;
}

async function api(action, params={}){
  const url = new URL(API, location.origin);
  url.searchParams.set("action", action);
  Object.entries(params).forEach(([k,v])=>{
    url.searchParams.set(k,v);
  });

  const res = await fetch(url);
  return res.json();
}

async function newInbox(){
  showAlert("Creating inbox...");
  const data = await api("newInbox");

  state = data;

  document.getElementById("shortEmail").textContent = shortEmail(data.address);

  showAlert("");
  loadInbox();
}

async function loadInbox(){
  if(!state) return;

  showAlert("Checking inbox...");

  const items = await api("getMessages",{inboxId:state.inboxId});

  const list = document.getElementById("inboxList");
  list.innerHTML = "";

  items.forEach(item=>{
    const li = document.createElement("li");
    li.className="p-2 border border-gray-700 cursor-pointer";
    li.textContent = item.subject || "(no subject)";

    li.onclick = ()=>loadMessage(item.id);

    list.appendChild(li);
  });

  showAlert("");
}

async function loadMessage(id){
  showAlert("Loading message...");
  const msg = await api("readMessage",{id});

  const body = document.getElementById("msgBody");
  body.innerHTML = msg.htmlBody || msg.body || "";

  showAlert("");
}

document.getElementById("btnNew").onclick = newInbox;

document.getElementById("btnCopy").onclick = ()=>{
  if(!state) return;
  navigator.clipboard.writeText(state.address);
};

document.getElementById("btnRefresh").onclick = loadInbox;

newInbox();

</script>

</body>
</html>
