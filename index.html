<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>TempMailBox</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-black text-white min-h-screen flex flex-col">

<header class="p-4 border-b border-gray-800 flex justify-between items-center">
  <div>
    <h1 class="font-bold text-lg">TempMailBox</h1>
    <p class="text-xs text-gray-400">10 minute disposable email</p>
  </div>
  <button id="btnNew" class="bg-green-500 text-black px-4 py-2 rounded">
    New Address
  </button>
</header>

<main class="flex-1 p-4 max-w-5xl mx-auto w-full space-y-4">

<div id="alert" class="hidden text-sm p-2 rounded"></div>

<div class="bg-gray-900 p-4 rounded space-y-2">
  <div class="flex justify-between items-center">

    <div>
      <p class="text-xs text-gray-400">Your email</p>
      <p id="emailText" class="font-mono text-sm break-all"></p>
      <p class="text-xs text-gray-500">
        Expires in <span id="countdown"></span>
      </p>
    </div>

    <div class="flex gap-2">
      <button id="btnExtend" class="bg-purple-600 px-3 py-1 text-xs rounded">
        +10m
      </button>
      <button id="btnCopy" class="border px-3 py-1 text-xs">Copy</button>
      <button id="btnRefresh" class="border px-3 py-1 text-xs">Refresh</button>
    </div>

  </div>
</div>

<div class="grid md:grid-cols-2 gap-4">

<div class="bg-gray-900 p-4 rounded">
  <h2 class="mb-2">Inbox</h2>
  <ul id="inboxList" class="space-y-2"></ul>
</div>

<div class="bg-gray-900 p-4 rounded">
  <h2 class="mb-2">Message</h2>
  <div id="msgBody" class="text-sm"></div>
</div>

</div>

</main>

<script>

let state = null;

const $ = (id) => document.getElementById(id);

const el = {
  email: $("email"),
  expires: $("expires"),
  inbox: $("inbox"),
  msg: $("msg"),
  alert: $("alert"),
  btnCopy: $("btnCopy"),
};

// ---------- ALERT SYSTEM ----------
function showAlert(message, type = "success") {
  const colors = {
    success: "bg-green-500 text-black",
    error: "bg-red-600 text-white",
  };

  el.alert.textContent = message;
  el.alert.className = `
    fixed top-5 left-1/2 -translate-x-1/2 z-50
    ${colors[type]}
    font-semibold px-5 py-3 rounded-xl shadow-lg
  `;

  setTimeout(() => {
    el.alert.className = "hidden";
    el.alert.textContent = "";
  }, 1800);
}

// ---------- COPY FUNCTION ----------
el.btnCopy.onclick = async () => {
  if (!state || !state.address) {
    showAlert("No email to copy", "error");
    return;
  }

  try {
    await navigator.clipboard.writeText(state.address);
    showAlert("✅ Email copied");
  } catch (err) {
    showAlert("Copy failed - copy manually", "error");
  }
};

// ---------- BASIC RENDER ----------
function render() {
  if (!state) return;

  el.email.textContent = state.address;
  el.expires.textContent = "Ready";
}

// ---------- INIT ----------
function init() {
  state = {
    address: "test@email.com", // temporary test
  };

  render();
}

init();

</script>

</body>
</html>
